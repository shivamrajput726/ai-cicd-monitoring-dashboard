apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ai-cicd-monitor
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ai-cicd-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ai-cicd-monitor
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

