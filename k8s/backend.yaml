apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-cicd-monitor
data:
  APP_NAME: "AI CI/CD Monitoring API"
  ENV: "production"
  DEBUG: "false"
  DATABASE_URL: "postgresql://app:app@postgres:5432/app"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ai-cicd-monitor
type: Opaque
stringData:
  JWT_SECRET_KEY: "CHANGE_ME_IN_PROD"
  JWT_ALGORITHM: "HS256"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-cicd-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-docker-registry/ai-cicd-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-cicd-monitor
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

