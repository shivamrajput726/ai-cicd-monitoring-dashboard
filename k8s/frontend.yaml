apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-cicd-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-docker-registry/ai-cicd-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: "http://backend.ai-cicd-monitor.svc.cluster.local:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-cicd-monitor
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

